name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: YOUR_EC2_PUBLIC_IP
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/deploy/aws-ci-cd
          git pull origin main
          sudo systemctl restart nginx
